<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peanut &amp; Banans' Life Plans (Good Times Only)</title>
<style>
/* Ensure [hidden] always hides, even when other rules set display */
[hidden] { display: none !important; }

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #f5f5f7;
    color: #1d1d1f;
    min-height: 100vh;
}

/* --- Lock screen (full viewport modal until decrypted) --- */
.lock-screen {
    position: fixed;
    inset: 0;
    background: rgba(245, 245, 247, 0.96);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    z-index: 100;
}
.lock-card {
    background: #fff;
    padding: 2rem;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    max-width: 360px;
    width: 100%;
    text-align: center;
}
.lock-card h1 { font-size: 1.25rem; margin-bottom: 1.25rem; }
.lock-card input {
    width: 100%;
    padding: 0.6rem 0.75rem;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
    margin-bottom: 0.75rem;
    font-family: inherit;
}
.lock-card input:focus { outline: none; border-color: #0071e3; }
.lock-card button {
    width: 100%;
    padding: 0.65rem;
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
}
.lock-card button:hover { background: #0060c0; }
.lock-card button:disabled { opacity: 0.6; cursor: wait; }
.lock-card .error {
    color: #c0392b;
    font-size: 0.9rem;
    margin-top: 0.5rem;
    min-height: 1.2em;
}

/* --- Header --- */
header {
    background: #fff;
    border-bottom: 1px solid #e0e0e0;
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
}
header h1 { font-size: 1.1rem; font-weight: 600; }
.generated { font-size: 0.75rem; color: #888; }

.view-toggle {
    display: inline-flex;
    background: #f0f0f0;
    border-radius: 8px;
    padding: 2px;
}
.view-toggle button {
    background: none;
    border: none;
    padding: 0.35rem 0.9rem;
    font-size: 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    color: #555;
    font-family: inherit;
}
.view-toggle button.active {
    background: #fff;
    color: #0071e3;
    font-weight: 500;
    box-shadow: 0 1px 2px rgba(0,0,0,0.08);
}

main { padding: 1rem; }

.card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid #e0e0e0;
    padding: 1.25rem;
}

/* --- Nav --- */
.cal-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
}
.cal-nav h2 { font-size: 1rem; font-weight: 600; }
.cal-arrow {
    background: none;
    border: none;
    font-size: 1.2rem;
    color: #555;
    cursor: pointer;
    padding: 0.2rem 0.7rem;
    border-radius: 6px;
    font-family: inherit;
}
.cal-arrow:hover { background: #f0f0f0; color: #0071e3; }

/* --- Grid view --- */
.cal-weekdays-wrap {
    display: flex;
    margin-bottom: 0.35rem;
}
.cal-label-spacer { width: 2.25rem; flex-shrink: 0; }
.cal-weekdays {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-size: 0.72rem;
    font-weight: 600;
    color: #888;
    text-transform: uppercase;
    letter-spacing: 0.04em;
}

.cal-month-section {
    display: flex;
    align-items: stretch;
}
.cal-month-label {
    width: 2.25rem;
    flex-shrink: 0;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.5rem 0;
    font-size: 0.8rem;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.08em;
}
.cal-month-section.alt .cal-month-label { color: #3a547a; }

.cal-weeks { flex: 1; min-width: 0; }

.cal-row {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 3px;
    margin-bottom: 3px;
    min-height: 5.5rem;
}

.cal-day {
    background: #fafafa;
    border: 1px solid #e8e8e8;
    border-radius: 6px;
    padding: 0.35rem 0.4rem;
    overflow: hidden;
}
.cal-day-alt { background: #f0f3f9; }
.cal-day.cal-today { background: #eef4ff; border-color: #0071e3; }

.day-number {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    color: #444;
    margin-bottom: 0.25rem;
}
.cal-today .day-number { color: #0071e3; }

.cal-event {
    background: #ddeeff;
    color: #003a75;
    border-left: 3px solid #0071e3;
    border-radius: 3px;
    padding: 0.15rem 0.35rem;
    margin-bottom: 0.15rem;
    font-size: 0.72rem;
    line-height: 1.35;
    word-break: break-word;
}
.cal-event.purple { background: #f0e6ff; color: #4c1d95; border-left-color: #7c3aed; }
.cal-event.yellow { background: #fef9c3; color: #78350f; border-left-color: #d97706; }
.cal-event.cont { opacity: 0.7; border-left-style: dashed; }

/* --- List view --- */
.list-empty {
    text-align: center;
    color: #888;
    font-size: 0.9rem;
    padding: 2rem;
}
.list-date-header {
    font-size: 0.85rem;
    font-weight: 600;
    color: #555;
    padding: 0.75rem 0 0.4rem;
    border-bottom: 1px solid #e8e8e8;
    margin-bottom: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
}
.list-date-header.today {
    color: #0071e3;
    border-bottom-color: #0071e3;
}
.list-item {
    padding: 0.6rem 0.85rem;
    background: #ddeeff;
    color: #003a75;
    border-left: 3px solid #0071e3;
    border-radius: 6px;
    margin-bottom: 0.4rem;
    font-size: 0.9rem;
}
.list-item.purple { background: #f0e6ff; color: #4c1d95; border-left-color: #7c3aed; }
.list-item.yellow { background: #fef9c3; color: #78350f; border-left-color: #d97706; }
.list-item-title { font-weight: 500; }
.list-item-range, .list-item-notes {
    font-size: 0.78rem;
    margin-top: 0.2rem;
    opacity: 0.8;
}

/* Mobile tweaks */
@media (max-width: 600px) {
    header { padding: 0.6rem 1rem; }
    header h1 { font-size: 1rem; }
    .generated { width: 100%; order: 3; }
    .cal-day { padding: 0.2rem; }
    .day-number { font-size: 0.7rem; }
    .cal-event { font-size: 0.65rem; padding: 0.1rem 0.25rem; }
    .cal-row { min-height: 4rem; }
    .cal-label-spacer, .cal-month-label { width: 1.75rem; }
    .cal-month-label { font-size: 0.7rem; }
}
</style>
</head>
<body>

<!-- Password prompt (full-screen modal, removed from DOM flow when unlocked) -->
<div id="lock-screen" class="lock-screen">
    <form id="unlock-form" class="lock-card">
        <h1>Peanut &amp; Banans' Life Plans (Good Times Only)</h1>
        <input type="password" id="password-input" placeholder="Password"
               autocomplete="current-password" autofocus>
        <button id="unlock-btn" type="submit">View Calendar</button>
        <p id="error-msg" class="error"></p>
    </form>
</div>

<!-- Calendar (hidden until decrypt succeeds) -->
<div id="calendar" hidden>
    <header>
        <h1>Peanut &amp; Banans' Life Plans (Good Times Only)</h1>
        <div class="view-toggle" role="tablist">
            <button type="button" id="view-grid-btn" class="active" data-view="grid">Grid</button>
            <button type="button" id="view-list-btn" data-view="list">List</button>
        </div>
        <span id="generated" class="generated"></span>
    </header>

    <main>
        <div class="card">
            <div class="cal-nav">
                <button id="prev-btn" class="cal-arrow" aria-label="Previous month">&#8592;</button>
                <h2 id="anchor-label"></h2>
                <button id="next-btn" class="cal-arrow" aria-label="Next month">&#8594;</button>
            </div>

            <!-- Grid view -->
            <div id="grid-view">
                <div class="cal-weekdays-wrap">
                    <div class="cal-label-spacer"></div>
                    <div class="cal-weekdays">
                        <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div>
                        <div>Thu</div><div>Fri</div><div>Sat</div>
                    </div>
                </div>
                <div id="grid-sections"></div>
            </div>

            <!-- List view -->
            <div id="list-view" hidden>
                <div id="list-items"></div>
            </div>
        </div>
    </main>
</div>

const PW_KEY   = "hc_password_v1";
const VIEW_KEY = "hc_view_v1";

const MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];
const WEEKDAY_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

// --- Crypto ---

async function deriveKey(password, salt, iterations) {
    const km = await crypto.subtle.importKey(
        "raw", new TextEncoder().encode(password),
        "PBKDF2", false, ["deriveKey"]
    );
    return crypto.subtle.deriveKey(
        { name: "PBKDF2", salt, iterations, hash: "SHA-256" },
        km,
        { name: "AES-GCM", length: 256 },
        false,
        ["decrypt"]
    );
}

async function decrypt(password) {
    const key = await deriveKey(
        password, b64(ENCRYPTED_BLOB.salt), ENCRYPTED_BLOB.iterations
    );
    const plain = await crypto.subtle.decrypt(
        { name: "AES-GCM", iv: b64(ENCRYPTED_BLOB.iv) },
        key,
        b64(ENCRYPTED_BLOB.ciphertext)
    );
    return JSON.parse(new TextDecoder().decode(plain));
}

// --- Date helpers ---

function parseISODate(s) {
    const [y, m, d] = s.split("-").map(Number);
    return new Date(y, m - 1, d);
}

function fmtISO(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}

function buildWeeksForMonth(year, month) {
    const first = new Date(year, month, 1);
    const start = new Date(first);
    start.setDate(first.getDate() - first.getDay()); // back to Sunday
    const lastOfMonth = new Date(year, month + 1, 0).getDate();
    const last = new Date(year, month, lastOfMonth);
    const end = new Date(last);
    end.setDate(last.getDate() + (6 - last.getDay())); // forward to Saturday

    const weeks = [];
    const cur = new Date(start);
    while (cur <= end) {
        const week = [];
        for (let i = 0; i < 7; i++) {
            week.push(new Date(cur));
            cur.setDate(cur.getDate() + 1);
        }
        weeks.push(week);
    }
    return weeks;
}

function buildThreeMonthView(anchorYear, anchorMonth) {
    // Determine the three target months
    const targetMonths = [];
    for (let i = 0; i < 3; i++) {
        const total = anchorMonth + i;
        const m = ((total % 12) + 12) % 12;
        const y = anchorYear + Math.floor(total / 12);
        targetMonths.push({ year: y, month: m });
    }

    // Collect all unique weeks (dedup boundary weeks shared between adjacent months)
    const allWeeks = [];
    const seen = new Set();
    for (const { year, month } of targetMonths) {
        for (const week of buildWeeksForMonth(year, month)) {
            const key = week[0].getTime();
            if (!seen.has(key)) {
                seen.add(key);
                allWeeks.push(week);
            }
        }
    }

    // Owner of a week = target month with the most days in it
    const targetKeys = new Set(targetMonths.map(m => `${m.year}-${m.month}`));
    function ownerOf(week) {
        const counts = {};
        for (const d of week) {
            const k = `${d.getFullYear()}-${d.getMonth()}`;
            if (targetKeys.has(k)) counts[k] = (counts[k] || 0) + 1;
        }
        let best = null, bestCount = -1;
        for (const k in counts) {
            if (counts[k] > bestCount) { bestCount = counts[k]; best = k; }
        }
        return best;
    }

    // Group consecutive same-owner weeks into sections
    const sections = [];
    for (const week of allWeeks) {
        const key = ownerOf(week);
        const last = sections[sections.length - 1];
        if (last && last.ownerKey === key) {
            last.weeks.push(week);
        } else {
            const [y, m] = key.split("-").map(Number);
            sections.push({ ownerKey: key, year: y, month: m, weeks: [week] });
        }
    }

    const altMonth = targetMonths[1];
    const gridStart = sections[0].weeks[0][0];
    const gridEnd = sections[sections.length - 1].weeks.at(-1)[6];
    return { sections, altMonth, gridStart, gridEnd };
}

// --- Event handling ---

function groupEventsByDate(events, rangeStart, rangeEnd) {
    const byDate = {};
    for (const ev of events) {
        const s = parseISODate(ev.date);
        const e = ev.end_date ? parseISODate(ev.end_date) : s;
        const from = s < rangeStart ? rangeStart : s;
        const to   = e > rangeEnd   ? rangeEnd   : e;
        if (from > to) continue;
        const cur = new Date(from);
        while (cur <= to) {
            const key = fmtISO(cur);
            (byDate[key] ||= []).push(ev);
            cur.setDate(cur.getDate() + 1);
        }
    }
    return byDate;
}

function eventColor(title) {
    if (title.includes("~")) return "purple";
    if (title.includes("*")) return "yellow";
    return "";
}

function cleanTitle(title) {
    return title.replace(/~/g, "").replace(/\*/g, "").trim();
}

function fmtTime(hhmm) {
    if (!hhmm) return "";
    const [h, m] = hhmm.split(":").map(Number);
    const suffix = h < 12 ? "AM" : "PM";
    const h12 = (h % 12) || 12;
    return `${h12}:${String(m).padStart(2, "0")} ${suffix}`;
}

// --- Render ---

let allEvents = [];
let viewYear, viewMonth;
let currentView = "grid";

function setView(v) {
    currentView = v;
    localStorage.setItem(VIEW_KEY, v);
    document.getElementById("view-grid-btn").classList.toggle("active", v === "grid");
    document.getElementById("view-list-btn").classList.toggle("active", v === "list");
    document.getElementById("grid-view").hidden = v !== "grid";
    document.getElementById("list-view").hidden = v !== "list";
    renderCurrent();
}

function renderCurrent() {
    if (currentView === "grid") renderGrid();
    else renderList();
}

function renderGrid() {
    const { sections, altMonth, gridStart, gridEnd } = buildThreeMonthView(viewYear, viewMonth);
    document.getElementById("anchor-label").textContent =
        `${MONTH_NAMES[viewMonth]} ${viewYear}`;

    const byDate = groupEventsByDate(allEvents, gridStart, gridEnd);
    const todayISO = fmtISO(new Date());

    const container = document.getElementById("grid-sections");
    container.textContent = "";

    sections.forEach((section, idx) => {
        const sec = document.createElement("div");
        sec.className = "cal-month-section";
        if (idx % 2 === 1) sec.classList.add("alt");

        const label = document.createElement("div");
        label.className = "cal-month-label";
        label.textContent = `${MONTH_NAMES[section.month]} ${section.year}`;
        sec.appendChild(label);

        const weeksDiv = document.createElement("div");
        weeksDiv.className = "cal-weeks";

        for (const week of section.weeks) {
            const row = document.createElement("div");
            row.className = "cal-row";
            for (const day of week) {
                const cell = document.createElement("div");
                cell.className = "cal-day";
                if (day.getFullYear() === altMonth.year && day.getMonth() === altMonth.month) {
                    cell.classList.add("cal-day-alt");
                }
                if (fmtISO(day) === todayISO) cell.classList.add("cal-today");

                const num = document.createElement("span");
                num.className = "day-number";
                num.textContent = day.getDate();
                cell.appendChild(num);

                const events = byDate[fmtISO(day)] || [];
                for (const ev of events) {
                    const pill = document.createElement("div");
                    pill.className = "cal-event";
                    const color = eventColor(ev.title);
                    if (color) pill.classList.add(color);
                    const isStart = ev.date === fmtISO(day);
                    if (!isStart) pill.classList.add("cont");
                    let label = cleanTitle(ev.title);
                    if (isStart && ev.time) label = `${fmtTime(ev.time)} ${label}`;
                    pill.textContent = label;
                    cell.appendChild(pill);
                }
                row.appendChild(cell);
            }
            weeksDiv.appendChild(row);
        }
        sec.appendChild(weeksDiv);
        container.appendChild(sec);
    });
}

function renderList() {
    const { gridStart, gridEnd } = buildThreeMonthView(viewYear, viewMonth);
    document.getElementById("anchor-label").textContent =
        `${MONTH_NAMES[viewMonth]} ${viewYear}`;

    // Events that overlap the 3-month range
    const inRange = allEvents.filter(ev => {
        const s = parseISODate(ev.date);
        const e = ev.end_date ? parseISODate(ev.end_date) : s;
        return e >= gridStart && s <= gridEnd;
    });

    // Sort by start date, then time
    inRange.sort((a, b) => {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        const at = a.time || "", bt = b.time || "";
        if (at && bt) return at < bt ? -1 : (at > bt ? 1 : 0);
        if (at) return -1;
        if (bt) return 1;
        return 0;
    });

    // Group by start date
    const byDate = {};
    for (const ev of inRange) (byDate[ev.date] ||= []).push(ev);

    const container = document.getElementById("list-items");
    container.textContent = "";

    const dates = Object.keys(byDate).sort();
    if (dates.length === 0) {
        const empty = document.createElement("p");
        empty.className = "list-empty";
        empty.textContent = "No events in this range.";
        container.appendChild(empty);
        return;
    }

    const todayISO = fmtISO(new Date());
    for (const dateISO of dates) {
        const d = parseISODate(dateISO);
        const header = document.createElement("div");
        header.className = "list-date-header";
        let headerText = `${WEEKDAY_SHORT[d.getDay()]}, ${MONTH_NAMES[d.getMonth()]} ${d.getDate()}`;
        if (dateISO === todayISO) {
            headerText += " · Today";
            header.classList.add("today");
        }
        header.textContent = headerText;
        container.appendChild(header);

        for (const ev of byDate[dateISO]) {
            const item = document.createElement("div");
            item.className = "list-item";
            const color = eventColor(ev.title);
            if (color) item.classList.add(color);

            const titleEl = document.createElement("div");
            titleEl.className = "list-item-title";
            let text = cleanTitle(ev.title);
            if (ev.time) text = `${fmtTime(ev.time)} — ${text}`;
            titleEl.textContent = text;
            item.appendChild(titleEl);

            if (ev.end_date && ev.end_date !== ev.date) {
                const range = document.createElement("div");
                range.className = "list-item-range";
                range.textContent = `Through ${ev.end_date}`;
                item.appendChild(range);
            }
            if (ev.notes) {
                const notes = document.createElement("div");
                notes.className = "list-item-notes";
                notes.textContent = ev.notes;
                item.appendChild(notes);
            }
            container.appendChild(item);
        }
    }
}

// --- Unlock flow ---

function showCalendar(data) {
    allEvents = data.events;
    document.getElementById("generated").textContent = `Updated ${data.generated}`;
    document.getElementById("lock-screen").hidden = true;
    document.getElementById("calendar").hidden = false;

    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();

    const savedView = localStorage.getItem(VIEW_KEY) || "grid";
    setView(savedView);
}

async function tryUnlock(password, fromCache) {
    const btn = document.getElementById("unlock-btn");
    btn.disabled = true;
    btn.textContent = "Unlocking…";
    try {
        const data = await decrypt(password);
        localStorage.setItem(PW_KEY, password);
        showCalendar(data);
        return true;
    } catch (e) {
        if (fromCache) {
            // Cached password no longer matches (password was changed) — re-prompt
            localStorage.removeItem(PW_KEY);
        } else {
            document.getElementById("error-msg").textContent = "Incorrect password";
        }
        return false;
    } finally {
        btn.disabled = false;
        btn.textContent = "View Calendar";
    }
}

document.getElementById("unlock-form").addEventListener("submit", async e => {
    e.preventDefault();
    document.getElementById("error-msg").textContent = "";
    await tryUnlock(document.getElementById("password-input").value, false);
});

document.getElementById("prev-btn").addEventListener("click", () => {
    let y = viewYear, m = viewMonth - 1;
    if (m < 0) { m = 11; y -= 1; }
    viewYear = y; viewMonth = m;
    renderCurrent();
});

document.getElementById("next-btn").addEventListener("click", () => {
    let y = viewYear, m = viewMonth + 1;
    if (m > 11) { m = 0; y += 1; }
    viewYear = y; viewMonth = m;
    renderCurrent();
});

document.getElementById("view-grid-btn").addEventListener("click", () => setView("grid"));
document.getElementById("view-list-btn").addEventListener("click", () => setView("list"));

// Auto-unlock with cached password on load
const cachedPw = localStorage.getItem(PW_KEY);
if (cachedPw) tryUnlock(cachedPw, true);
</script>
